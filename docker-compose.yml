version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: safenest-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DATABASE_DB:-safenest_db}
      MYSQL_USER: ${DATABASE_USER:-safenest_user}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-password123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - safenest-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: safenest-backend
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/${DATABASE_DB:-safenest_db}
      DATABASE_USER: ${DATABASE_USER:-safenest_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password123}
      SERVER_PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - safenest-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: safenest-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - safenest-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  safenest-network:
    driver: bridge
